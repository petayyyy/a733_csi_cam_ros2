name: ROS 2 Humble CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup ROS 2
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble

      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update
          rosdep update
          rosdep install --from-paths . --ignore-src -r -y --rosdistro humble

      - name: Build
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --event-handlers console_direct+ --packages-select a733_csi_cam_ros2 --cmake-args -DCMAKE_BUILD_TYPE=Release
